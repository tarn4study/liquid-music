version: "3.8"

services:
  glass-water-player:
    build: .
    container_name: glass-water-player
    ports:
      - "5060:3000"
    environment:
      - NODE_ENV=production
    volumes:
      # Persist configuration file so credentials aren't lost on restart
      - ./server_config.json:/app/server_config.json
      # Mount custom backgrounds folder
      - ./backgrounds:/app/backgrounds
    restart: unless-stopped
